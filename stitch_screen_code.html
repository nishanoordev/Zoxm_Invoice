<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Customer Profile - BillSnap</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {},
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-slate-900 pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#272756] dark:bg-slate-950 text-white dark:text-blue-400 border-b border-white/10 dark:border-slate-800 shadow-lg flex items-center justify-between px-4 h-16 w-full">
<div class="flex items-center gap-4">
<button class="hover:bg-white/10 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg">Edit Customer</h1>
</div>
<button class="hover:bg-white/10 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</header>
<main class="mt-20 px-4 max-w-2xl mx-auto space-y-6">
<!-- Profile Image Section -->
<section class="flex flex-col items-center py-6">
<div class="relative group">
<div class="w-28 h-28 rounded-full border-4 border-white shadow-md overflow-hidden bg-slate-200">
<img alt="Customer Avatar" class="w-full h-full object-cover" data-alt="Professional portrait of a male customer" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDDTLDfbtI1Ydjzu14iKaCqT-doIVqnm2frHfWTvra-49t0Q4nVsOgZOj_o2sFXjVe0XW-w9Rzo7iGdKab95kIj0DiVnicPND3mYLvDz1QdOwFdoQPlhnkmHDZWMwggUz6DuDWQHOs9mz81zGN-xMgSgvc5FPLVTbipeGyACVh7u8zA7J98tQV0xXy0-5OJVj9FSvcC52ZHwoIxSsyYEhu93DYfurtbZmONLQrGoEHVpBs6DXXFs7uR6E66AiNkTq495jLNr0iVJE"/>
</div>
<button class="absolute bottom-0 right-0 bg-[#272756] text-white p-2 rounded-full shadow-lg border-2 border-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</button>
</div>
</section>
<!-- Basic Information -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<div class="p-4 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
<h2 class="text-sm font-bold text-[#272756] dark:text-blue-400 uppercase tracking-wider">Basic Information</h2>
</div>
<div class="p-5 space-y-4">
<div>
<label class="block text-xs font-semibold text-slate-500 mb-1">Customer Name</label>
<input class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#272756] focus:border-transparent outline-none transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-white" type="text" value="Alexander Hamilton"/>
</div>
<div>
<label class="block text-xs font-semibold text-slate-500 mb-1">Email</label>
<input class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#272756] focus:border-transparent outline-none transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-white" type="email" value="a.hamilton@treasury.gov"/>
</div>
<div>
<label class="block text-xs font-semibold text-slate-500 mb-1">Phone Number</label>
<input class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#272756] focus:border-transparent outline-none transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-white" type="tel" value="+1 (555) 1789-1804"/>
</div>
</div>
</div>
<!-- Billing Address -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<div class="p-4 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
<h2 class="text-sm font-bold text-[#272756] dark:text-blue-400 uppercase tracking-wider">Billing Address</h2>
</div>
<div class="p-5">
<label class="block text-xs font-semibold text-slate-500 mb-1">Full Address</label>
<textarea class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#272756] focus:border-transparent outline-none transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-white" rows="3">100 Liberty Street, Financial District
New York, NY 10005
United States</textarea>
</div>
</div>
<!-- Internal Notes -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
<div class="p-4 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
<h2 class="text-sm font-bold text-[#272756] dark:text-blue-400 uppercase tracking-wider">Internal Notes</h2>
</div>
<div class="p-5">
<label class="block text-xs font-semibold text-slate-500 mb-1">Business Comments</label>
<textarea class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-[#272756] focus:border-transparent outline-none transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-white" placeholder="e.g., Net 30 terms" rows="2">High priority client. Prefers digital invoices. Net 30 terms applied.</textarea>
</div>
</div>
<!-- Save Button -->
<div class="pt-4 pb-12">
<button class="w-full bg-[#272756] text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-[#1e1e42] active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="save">save</span>
                Save Changes
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-16 px-2 pb-safe bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50 rounded-t-lg">
<a class="flex flex-col items-center justify-center bg-[#272756]/10 dark:bg-blue-900/30 text-[#272756] dark:text-blue-300 rounded-xl px-3 py-1 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-['Inter'] text-[11px] font-medium">Customers</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1 hover:text-[#272756] dark:hover:text-blue-400 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-['Inter'] text-[11px] font-medium">Invoices</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1 hover:text-[#272756] dark:hover:text-blue-400 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-['Inter'] text-[11px] font-medium">Inventory</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1 hover:text-[#272756] dark:hover:text-blue-400 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[11px] font-medium">Settings</span>
</a>
</nav>
</body></html>
