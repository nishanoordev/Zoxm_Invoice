<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Record Payment - BillSnap</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#272756",
                        "accent": "#ec5b13",
                        "background-light": "#f8f9fc",
                        "background-dark": "#0f0f2d",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-900 shadow-xl overflow-x-hidden">
<!-- Header -->
<header class="flex items-center px-4 py-6 gap-4 border-b border-slate-100 dark:border-slate-800">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-slate-200">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-primary dark:text-white">Record Payment</h1>
</header>
<main class="flex-1 px-4 py-6 pb-24">
<!-- Customer Selection -->
<div class="mb-6">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Select Customer</label>
<div class="relative">
<select class="w-full appearance-none rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-4 pr-12 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
<option value="">Search or select a customer</option>
<option value="1">Acme Corp</option>
<option value="2">Global Industries</option>
<option value="3">Sarah Johnson</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Linked Invoice Section -->
<div class="mb-6 p-4 rounded-xl border border-primary/10 bg-primary/5 dark:bg-primary/10">
<div class="flex items-center justify-between mb-3">
<div>
<p class="text-[10px] font-bold text-primary dark:text-primary/80 uppercase tracking-widest">Linked Invoice</p>
<p class="text-base font-bold text-slate-900 dark:text-white mt-1">Invoice #INV-2024-001</p>
</div>
<div class="size-12 rounded-lg bg-cover bg-center border border-slate-200 dark:border-slate-700 shadow-sm" data-alt="Small thumbnail preview of the selected invoice document" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAgTq0C41W4W8o5duQObk40T-Jf3uigsp_evyi0rv2R2OzT-CMBxIORr0MziQCVWmwHdSLa1GFuvCWV76amI0I798-_yoK_bKQcvNFLOZEWc2iSCEm5m4rNmLyWJKa6fDLXAxeQdjiYoEMMJyXInM5Knv7g2MqtDEnghbbn2L17jdntruN9veWudJZEfs98or3nNc7MwP74x2yhgzRtfbG4_j2lVdGpp_Q9fhXNWNaFOOcvuah_etv357-Opexiuayu_BCBEhqH8YQ')"></div>
</div>
<div class="pt-3 border-t border-primary/10 flex justify-between items-center">
<span class="text-sm text-slate-600 dark:text-slate-400">Outstanding Balance</span>
<span class="text-base font-bold text-accent">$450.00</span>
</div>
</div>
<!-- Payment Amount -->
<div class="mb-6">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Payment Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">$</span>
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-4 pl-8 text-slate-900 dark:text-slate-100 font-bold text-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-300" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Payment Method -->
<div class="mb-6">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">Payment Method</label>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary bg-primary text-white shadow-md shadow-primary/20">
<span class="material-symbols-outlined mb-1">payments</span>
<span class="text-xs font-bold uppercase tracking-wide">Cash</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all">
<span class="material-symbols-outlined mb-1 text-slate-600 dark:text-slate-400">credit_card</span>
<span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Card</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all">
<span class="material-symbols-outlined mb-1 text-slate-600 dark:text-slate-400">account_balance</span>
<span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Transfer</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-primary transition-all">
<span class="material-symbols-outlined mb-1 text-slate-600 dark:text-slate-400">history_edu</span>
<span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Check</span>
</button>
</div>
</div>
<!-- Date Picker -->
<div class="mb-6">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Payment Date</label>
<div class="relative">
<input class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" type="date" value="2024-05-20"/>
</div>
</div>
<!-- Reference / Notes -->
<div class="mb-8">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Reference / Notes (Optional)</label>
<textarea class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 p-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all resize-none" placeholder="Add a note or reference number..." rows="3"></textarea>
</div>
</main>
<!-- Fixed Footer Button -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-100 dark:border-slate-800">
<button class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:bg-primary/95 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">save</span>
            Save Payment
        </button>
</footer>
</div>
</body></html>
