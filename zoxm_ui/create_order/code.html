<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "navy-custom": "#272756",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>BillSnap - Create New Order</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header / TopAppBar -->
<div class="flex items-center bg-navy-custom p-4 pb-4 justify-between shadow-md">
<div class="text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-white/10 cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 ml-4">Create New Order</h2>
<div class="text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-white/10 cursor-pointer">
<span class="material-symbols-outlined">more_vert</span>
</div>
</div>
<div class="flex flex-col w-full max-w-2xl mx-auto pb-24">
<!-- Customer & Dates Section -->
<div class="px-4 pt-6">
<h3 class="text-navy-custom dark:text-primary text-xl font-bold mb-4">Order Details</h3>
<div class="grid grid-cols-1 gap-4">
<!-- Customer Dropdown -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-1.5 ml-1">Select Customer</p>
<div class="relative">
<select class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-navy-custom/20 h-14 pl-4 pr-10 text-base focus:ring-2 focus:ring-primary focus:border-primary appearance-none">
<option value="">Choose a customer...</option>
<option value="1">John Doe - Regular</option>
<option value="2">Jane Smith - Wholesale</option>
<option value="3">Acme Corp - Enterprise</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-4 pointer-events-none text-slate-400">expand_more</span>
</div>
</label>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Order Date -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-1.5 ml-1">Order Date</p>
<div class="flex w-full items-stretch">
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-navy-custom/20 h-14 px-4 text-base focus:ring-2 focus:ring-primary focus:border-primary" type="date" value="2023-10-27"/>
</div>
</label>
<!-- Delivery Date -->
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold pb-1.5 ml-1">Expected Delivery</p>
<div class="flex w-full items-stretch">
<input class="form-input flex w-full rounded-lg border-slate-300 dark:border-slate-700 bg-white dark:bg-navy-custom/20 h-14 px-4 text-base focus:ring-2 focus:ring-primary focus:border-primary" type="date"/>
</div>
</label>
</div>
</div>
</div>
<div class="h-px bg-slate-200 dark:bg-slate-800 mx-4 my-8"></div>
<!-- Items Section -->
<div class="px-4">
<div class="flex items-center justify-between mb-4">
<h3 class="text-navy-custom dark:text-primary text-xl font-bold">Items</h3>
<button class="flex items-center gap-1 bg-primary/10 text-primary px-4 py-2 rounded-lg font-semibold text-sm hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-sm">add_circle</span>
                        Add Item
                    </button>
</div>
<!-- Item List -->
<div class="space-y-3">
<!-- Item Card 1 -->
<div class="flex items-center gap-4 p-4 bg-white dark:bg-navy-custom/10 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm">
<div class="size-12 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined">package_2</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 dark:text-slate-100">Wireless Mouse M350</p>
<p class="text-xs text-slate-500">Unit Price: $25.00</p>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center border border-slate-200 dark:border-slate-700 rounded-lg bg-background-light dark:bg-navy-custom/30">
<button class="p-1 px-2 text-slate-500 hover:text-primary"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="px-2 font-semibold text-sm">2</span>
<button class="p-1 px-2 text-slate-500 hover:text-primary"><span class="material-symbols-outlined text-sm">add</span></button>
</div>
<p class="font-bold text-navy-custom dark:text-white w-16 text-right">$50.00</p>
</div>
</div>
<!-- Item Card 2 -->
<div class="flex items-center gap-4 p-4 bg-white dark:bg-navy-custom/10 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm">
<div class="size-12 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined">keyboard</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 dark:text-slate-100">Mechanical Keyboard K2</p>
<p class="text-xs text-slate-500">Unit Price: $89.00</p>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center border border-slate-200 dark:border-slate-700 rounded-lg bg-background-light dark:bg-navy-custom/30">
<button class="p-1 px-2 text-slate-500 hover:text-primary"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="px-2 font-semibold text-sm">1</span>
<button class="p-1 px-2 text-slate-500 hover:text-primary"><span class="material-symbols-outlined text-sm">add</span></button>
</div>
<p class="font-bold text-navy-custom dark:text-white w-16 text-right">$89.00</p>
</div>
</div>
</div>
</div>
<!-- Summary Section -->
<div class="mt-8 px-6 py-6 bg-navy-custom/5 dark:bg-navy-custom/20 rounded-2xl mx-4 border border-navy-custom/10 dark:border-white/5">
<div class="space-y-3">
<div class="flex justify-between text-slate-600 dark:text-slate-400">
<span>Subtotal</span>
<span>$139.00</span>
</div>
<div class="flex justify-between text-slate-600 dark:text-slate-400">
<span>Tax (8%)</span>
<span>$11.12</span>
</div>
<div class="h-px bg-slate-300 dark:bg-slate-700 my-2"></div>
<div class="flex justify-between text-xl font-bold text-navy-custom dark:text-primary">
<span>Total Amount</span>
<span>$150.12</span>
</div>
</div>
</div>
</div>
<!-- Sticky Footer Buttons -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 flex gap-4 max-w-2xl mx-auto z-10">
<button class="flex-1 h-14 rounded-xl border-2 border-navy-custom dark:border-primary text-navy-custom dark:text-primary font-bold hover:bg-navy-custom/5 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Save Order
            </button>
<button class="flex-1 h-14 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">receipt_long</span>
                Generate Invoice
            </button>
</div>
</div>
</body></html>
