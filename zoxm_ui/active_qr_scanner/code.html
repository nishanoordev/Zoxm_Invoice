<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#272756",
                        "accent": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a1a3d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>.scanner-viewfinder {
    background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuABU0NIgaDHZXbyCRrDf3JAhbWs7A-mt4FtVRyLDpZP9hka4HV6Bib503vruvDyADru11O_ONwwfyDR1oeUWYjzRduZZFWrGkxrrutLxdm8PvyxUz19gHsYDw2mMzvmG60jrgNfFZtvFZM4BHhwmFqw-UpXAfqfhjdOFICb9a8GlAlZMoPu1GYwbvy1FJa1g6Mh9XCEZBWh6qmFIb6Nb3DHzlTzC_eiap3E7lyAvRxeV5Yo-yqngSMwzX8ql3LiE6CVG7M9qPAtba4);
    background-size: cover;
    background-position: center
    }
.scan-frame {
    box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col scanner-viewfinder group/design-root" data-alt="Blurred retail shop interior with products on shelves">
<!-- Top Navigation Bar -->
<div class="flex items-center p-4 justify-between bg-primary/20 backdrop-blur-md z-10">
<button class="text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">BillSnap Scanner</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center rounded-full size-10 bg-white/10 text-white hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</div>
</div>
<!-- Scanner Main Area -->
<div class="flex-1 flex flex-col items-center justify-center relative">
<!-- Instructions -->
<div class="absolute top-12 left-0 right-0 flex justify-center px-6 text-center">
<div class="bg-primary/80 backdrop-blur-sm rounded-full px-6 py-2 border border-white/10">
<p class="text-white text-sm font-medium tracking-wide">Align QR code within the frame to scan</p>
</div>
</div>
<!-- Viewfinder Overlay -->
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<!-- Scanning Frame Corners -->
<div class="scan-frame absolute inset-0 border-2 border-transparent rounded-2xl"></div>
<!-- Corner Indicators -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-accent rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-accent rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-accent rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-accent rounded-br-xl"></div>
<!-- Animated-like Scanning Line (Static representation) -->
<div class="absolute top-1/2 left-4 right-4 h-0.5 bg-accent/60 shadow-[0_0_15px_rgba(236,91,19,0.8)]"></div>
</div>
<h4 class="text-white/80 text-sm font-bold uppercase tracking-widest mt-12">Scan Item QR Code</h4>
</div>
<!-- Bottom Controls -->
<div class="flex flex-col gap-4 p-6 bg-gradient-to-t from-primary/90 to-transparent z-10">
<div class="flex items-center justify-center gap-6 mb-2">
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/10 text-white hover:bg-white/20 transition-all">
<span class="material-symbols-outlined">image</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-20 bg-accent text-white shadow-lg hover:scale-105 transition-all">
<span class="material-symbols-outlined text-4xl">photo_camera</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/10 text-white hover:bg-white/20 transition-all">
<span class="material-symbols-outlined">history</span>
</button>
</div>
<div class="flex gap-4">
<button class="flex-1 cursor-pointer items-center justify-center rounded-xl h-14 bg-white/10 backdrop-blur-md text-white border border-white/20 text-base font-bold hover:bg-white/20 transition-colors">
<span class="truncate">Enter Manually</span>
</button>
<button class="flex-1 cursor-pointer items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold shadow-xl border border-white/10 hover:bg-primary/80 transition-colors">
<span class="truncate">Cancel</span>
</button>
</div>
<!-- Safe Area Spacer -->
<div class="h-4"></div>
</div>
</div>
</body></html>
