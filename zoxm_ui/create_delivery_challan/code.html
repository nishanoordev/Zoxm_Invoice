<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BillSnap - Create Delivery Challan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Inter", headline: ["Inter"], body: ["Inter"], label: ["Inter"]}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23ec5b13' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 sticky top-0 z-10 border-b border-primary/10">
<div class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-2">Create Delivery Challan</h1>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center rounded-lg h-10 px-4 bg-primary text-white gap-2 text-sm font-bold transition-opacity hover:opacity-90">
<span class="material-symbols-outlined text-[20px]">check</span>
<span>Save</span>
</button>
</div>
</header>
<main class="flex-1 max-w-2xl mx-auto w-full p-4 space-y-6">
<!-- Basic Details Section -->
<section class="space-y-4">
<div class="flex flex-col gap-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Select Customer</label>
<div class="relative">
<select class="custom-select w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 px-4 text-base">
<option value="">Search or select customer...</option>
<option value="1">Acme Corp Ltd.</option>
<option value="2">Global Logistics</option>
<option value="3">TechFlow Solutions</option>
</select>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Challan Date</label>
<input class="w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 px-4 text-base" type="date" value="2023-10-27"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Challan Number</label>
<input class="w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 px-4 text-base" placeholder="CH-2023-001" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Link to Invoice (Optional)</label>
<select class="custom-select w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 px-4 text-base">
<option value="">Select an existing invoice</option>
<option value="inv_101">INV-2023-452 (Pending Delivery)</option>
<option value="inv_102">INV-2023-455 (Partial Delivery)</option>
</select>
</div>
</section>
<!-- Status Selection -->
<section class="space-y-3">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold">Challan Status</h3>
<div class="flex gap-2">
<label class="flex-1 cursor-pointer group">
<input checked="" class="hidden peer" name="status" type="radio" value="draft"/>
<div class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all text-center">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">edit_note</span>
<span class="text-xs font-semibold mt-1">Draft</span>
</div>
</label>
<label class="flex-1 cursor-pointer group">
<input class="hidden peer" name="status" type="radio" value="open"/>
<div class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all text-center">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">rocket_launch</span>
<span class="text-xs font-semibold mt-1">Open</span>
</div>
</label>
<label class="flex-1 cursor-pointer group">
<input class="hidden peer" name="status" type="radio" value="delivered"/>
<div class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary/10 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all text-center">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">task_alt</span>
<span class="text-xs font-semibold mt-1">Delivered</span>
</div>
</label>
</div>
</section>
<!-- Items Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Items to Deliver</h3>
<button class="text-primary text-sm font-bold flex items-center gap-1 hover:underline">
<span class="material-symbols-outlined text-[18px]">add</span>
                        Add Item
                    </button>
</div>
<div class="space-y-3">
<!-- Item Card 1 -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800 p-3 rounded-xl border border-primary/5 shadow-sm">
<div class="bg-primary/10 rounded-lg size-16 flex items-center justify-center shrink-0 overflow-hidden">
<img class="object-cover size-full" data-alt="Close up of industrial tool gear" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnCWBfnG35ZyOZFf3Chd-HaATI-FVy5U3YRWHlLlLOWvmQZA0iBLwjUrG14MCl-qgM5P8wNGNsngR9ILTK-FB1qQbsoCzNgBW6QCf4Bu-eVmR7JpHUR2GZw2-HBX7Dmz8kXRrjwETA10goV1S2ZWsPg_Yrw9c22frpEca0G_KX0k9GWG3Mpef9DPjA0_RTk23J-P1MoUr_zDjDYff73JLNp3K2PClCuqr1f91dCajOzqoaH_H7-i-a3pNKE2QjeDglUywv_KP5rHM"/>
</div>
<div class="flex-1 min-w-0">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold truncate">Industrial Drill - Model X</p>
<p class="text-slate-500 text-xs truncate">SKU: DRILL-001 • Box A4</p>
</div>
<div class="flex flex-col items-end gap-2">
<div class="flex items-center gap-3 bg-background-light dark:bg-slate-700 rounded-lg p-1">
<button class="size-6 flex items-center justify-center rounded-md bg-white dark:bg-slate-600 text-primary shadow-sm">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="text-sm font-bold w-4 text-center">5</span>
<button class="size-6 flex items-center justify-center rounded-md bg-primary text-white shadow-sm">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
<span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Units</span>
</div>
</div>
<!-- Item Card 2 -->
<div class="flex items-center gap-4 bg-white dark:bg-slate-800 p-3 rounded-xl border border-primary/5 shadow-sm">
<div class="bg-primary/10 rounded-lg size-16 flex items-center justify-center shrink-0 overflow-hidden">
<img class="object-cover size-full" data-alt="Mechanical parts on assembly line" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCa_6qsnX3F3jKtVdgLpdAlC5Q2oBI4BKxNyqQ1ht38-wfwAsnzTyKrnRMQ7p8P9YRPgUNc2ufdk4UZ4ZKXI2A7m2KeQuSP_cAGrW_NwHPrsT6ypluGiD1DzifqNv41xKAZs5t2Uce8b5jwtC9rtDr05w7RDw8XdaPk8PjK96nQX5XGrjNWrJf5TLKBHbafF2lSF0_msGr2PC92ZgLu2idGOQVTVI1h1zfFT3rueD2JbDjVD0J5orCMV1ePKtX1LZs3kVJFLFna-G0"/>
</div>
<div class="flex-1 min-w-0">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold truncate">High-Tensile Bolts (Pack of 50)</p>
<p class="text-slate-500 text-xs truncate">SKU: BOLT-HT-50 • Shelf 2</p>
</div>
<div class="flex flex-col items-end gap-2">
<div class="flex items-center gap-3 bg-background-light dark:bg-slate-700 rounded-lg p-1">
<button class="size-6 flex items-center justify-center rounded-md bg-white dark:bg-slate-600 text-primary shadow-sm">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="text-sm font-bold w-4 text-center">12</span>
<button class="size-6 flex items-center justify-center rounded-md bg-primary text-white shadow-sm">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
<span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Packs</span>
</div>
</div>
</div>
</section>
<!-- Additional Info -->
<section class="space-y-4">
<div class="flex flex-col gap-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Vehicle / Delivery Mode</label>
<input class="w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 px-4 text-base" placeholder="Vehicle No, Courier Name, etc." type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Notes</label>
<textarea class="w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 focus:border-primary focus:ring-primary min-h-[100px] p-4 text-base resize-none" placeholder="Add delivery instructions or remarks..."></textarea>
</div>
</section>
<div class="pt-6 pb-12">
<button class="w-full bg-primary/10 text-primary font-bold py-4 rounded-xl border border-primary/20 hover:bg-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">print</span>
                    Save and Print Challan
                </button>
</div>
</main>
<!-- Bottom Tab Bar Placeholder (Optional UI) -->
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-primary/10 px-6 py-2 flex justify-between items-center md:hidden">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">description</span>
<span class="text-[10px] font-bold">Invoices</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">local_shipping</span>
<span class="text-[10px] font-bold">Challans</span>
</button>
<button class="size-12 -mt-8 bg-primary text-white rounded-full shadow-lg shadow-primary/40 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">add</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-bold">Customers</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold">More</span>
</button>
</nav>
</div>
</body></html>
